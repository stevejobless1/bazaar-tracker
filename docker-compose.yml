version: '3.8'

services:
  # The Data Collector
  tracker:
    build: .
    command: npm run start:tracker
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
      - HYPIXEL_API_KEY=${HYPIXEL_API_KEY}
    restart: always
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js", "tracker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # The REST API
  api:
    build: .
    command: npm run start:api
    ports:
      - "3000:3000"
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
      - PORT=3000
    restart: always
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js", "api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # The Daily Downsampler
  downsampler:
    build: .
    command: npm run start:downsampler
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
    restart: always
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js", "downsampler"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # The ML Prediction Engine
  ml-api:
    build: ../bazaar-ml
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bazaar-data:
