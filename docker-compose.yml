version: '3.8'

services:
  # The Data Collector
  tracker:
    build: .
    command: tail -f /dev/null
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
    restart: always

  # The REST API
  api:
    build: .
    command: tail -f /dev/null
    ports:
      - "3000:3000"
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
      - PORT=3000
    restart: always

  # The Daily Downsampler
  downsampler:
    build: .
    command: tail -f /dev/null
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
    restart: always

volumes:
  bazaar-data:
