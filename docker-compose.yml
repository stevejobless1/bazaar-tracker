version: '3.8'

services:
  # The Data Collector
  tracker:
    build: .
    command: npm run start:tracker
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
      - HYPIXEL_API_KEY=${HYPIXEL_API_KEY}
    restart: always

  # The REST API
  api:
    build: .
    command: npm run start:api
    ports:
      - "3000:3000"
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
      - PORT=3000
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # The Daily Downsampler
  downsampler:
    build: .
    command: npm run start:downsampler
    volumes:
      - bazaar-data:/app/data
    environment:
      - DB_PATH=/app/data/bazaar.db
    restart: always

volumes:
  bazaar-data:
